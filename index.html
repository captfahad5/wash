<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aircraft Scheduler</title>
<style>
/* ── BODY & GENERAL ── */
body { font-family: Arial; background: #0d1117; color: white; padding: 20px; transition: background 0.5s, color 0.5s; }
body.light-mode { background: #f4f4f4; color: #111; }
h1 { text-align: center; }
#creator { color: #38bdf8; font-size: 14px; text-align: center; margin-top: 5px; animation: bounce 2s infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);} }

/* ── TABLE ── */
table { width: 100%; border-collapse: collapse; margin-top: 10px; }
th, td { padding: 10px; border: 1px solid #333; text-align: center; }
th { background: #161b22; }
.due-soon { background: orange; color: black; }
.overdue { background: red; color: white; }

/* ── BUTTONS ── */
button { padding: 6px; margin: 5px; border: none; cursor: pointer; border-radius: 4px; color: white; }
.complete-btn { background: #1f6feb; }
.edit-btn { background: #f59e0b; }
.save-btn { background: #16a34a; }
.cancel-btn { background: #ef4444; }
.delete-btn { background: #dc2626; }
.aircraft-filter { cursor: pointer; text-decoration: underline; color: #38bdf8; margin: 0 5px; display:inline-block; min-width:60px; text-align:center; }
.aircraft-filter:hover { color: #fbbf24; }
.input-group { display:inline-block; margin-right:10px; text-align:center; }
.input-group label { font-size:12px; color:#888; display:block; margin-bottom:2px; }

/* ── HISTORY & ADD BUTTON ── */
.history-btn { position: absolute; top: 20px; right: 20px; background: #8b5cf6; padding: 6px 10px; border-radius: 4px; cursor: pointer; color: white; }
#addAircraftBtn { background: #16a34a; color: white; padding: 6px 10px; border-radius: 4px; cursor: pointer; }
#activityFilterSelect { margin-left: 10px; padding:3px; }

/* ── PASSWORD MODAL ── */
#passwordModal {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,0.9); display:flex; justify-content:center; align-items:center; z-index:1000;
  flex-direction: column; color:white;
}
#passwordModal input { padding:8px; border-radius:4px; border:none; margin-top:10px; width:200px; text-align:center; }
#passwordModal button { margin-top:10px; padding:6px 12px; border-radius:4px; cursor:pointer; background:#16a34a; border:none; color:white; }

/* ── TOGGLE SWITCH ── */
.toggle-container { position: fixed; top:20px; left:20px; display:flex; align-items:center; gap:8px; }
.toggle-container label { cursor: pointer; user-select: none; }
.switch { position: relative; display:inline-block; width:50px; height:28px; }
.switch input { opacity:0; width:0; height:0; }
.slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:#ccc; transition:.4s; border-radius:34px; }
.slider:before { position:absolute; content:""; height:22px; width:22px; left:3px; bottom:3px; background:white; transition:.4s; border-radius:50%; }
input:checked + .slider { background:#16a34a; }
input:checked + .slider:before { transform:translateX(22px); }
</style>
</head>
<body>

<!-- PASSWORD MODAL -->
<div id="passwordModal">
  <h2>Enter Password</h2>
  <input type="password" id="passwordInput" placeholder="Password">
  <button id="passwordBtn">Enter</button>
</div>

<!-- LIGHT/DARK TOGGLE -->
<div class="toggle-container">
  <label id="modeLabel">Dark</label>
  <label class="switch">
    <input type="checkbox" id="modeToggle">
    <span class="slider"></span>
  </label>
</div>

<h1>Automated Aircraft Scheduler</h1>
<p id="creator">Made By Capt Fahad ✈ | Powered By AI 💻</p>
<button id="toggleViewBtn" onclick="toggleView()" class="history-btn">History Log</button>

<!-- LIVE TRACKER -->
<div id="liveSection" style="display:block">
  <div>
    <label>Filter Aircraft:</label>
    <select id="filterAircraftSelect" onchange="applyFilter()"><option value="">All</option></select>
  </div>
  <div>
    <div class="input-group"><input type="text" id="aircraft" placeholder="Aircraft"></div>
    <div class="input-group"><label>Washing</label><input type="date" id="wash"></div>
    <div class="input-group"><label>Deep Cleaning</label><input type="date" id="deep"></div>
    <div class="input-group"><label>Fumigation</label><input type="date" id="fumi"></div>
    <button id="addAircraftBtn" onclick="addAircraft()">Add Aircraft</button>
  </div>
  <table>
    <thead>
      <tr>
        <th>Aircraft</th>
        <th>Washing</th>
        <th>Deep Cleaning</th>
        <th>Fumigation</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- HISTORY SECTION -->
<div id="historySection" style="display:none">
  <h2>History Log</h2>
  <div id="aircraftButtons"></div>
  <label>Filter Activity:</label>
  <select id="activityFilterSelect" onchange="renderHistory()">
    <option value="">All Activities</option>
    <option value="Washing">Washing</option>
    <option value="Deep Cleaning">Deep Cleaning</option>
    <option value="Fumigation">Fumigation</option>
  </select>
  <table>
    <thead>
      <tr>
        <th>Aircraft</th>
        <th>Activity</th>
        <th>Completed On</th>
        <th>Delete</th>
      </tr>
    </thead>
    <tbody id="historyBody"></tbody>
  </table>
</div>

<!-- FIREBASE + MAIN SCRIPT -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCphsY_lUP5iNCTtBL1FiNkktfc8WRjJMg",
  authDomain: "automated-aircraft-scheduler.firebaseapp.com",
  projectId: "automated-aircraft-scheduler",
  storageBucket: "automated-aircraft-scheduler.firebasestorage.app",
  messagingSenderId: "1000080060697",
  appId: "1:1000080060697:web:04cc5c81f08a0e77675588"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let aircraftList=[], historyList=[];
let filterAircraftLive="", filterAircraftHistory=null, editId=null;
const months=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];

function formatDate(date){ if(!date) return ""; const d=new Date(date); return `${String(d.getDate()).padStart(2,'0')}/${months[d.getMonth()]}/${d.getFullYear()}`; }
function getDiffDays(date){ if(!date) return 999; const today=new Date(), last=new Date(date); const next=new Date(last); next.setDate(last.getDate()+30); return Math.ceil((next-today)/(1000*60*60*24)); }
function calculateStatus(date){ const diff=getDiffDays(date); if(diff<0) return {text:"OVERDUE",class:"overdue"}; if(diff<=7) return {text:"DUE SOON",class:"due-soon"}; return {text:"",class:""}; }
function createCell(date,id,type,editMode){ const status=calculateStatus(date); const diff=getDiffDays(date); const last=new Date(date), next=new Date(last); next.setDate(last.getDate()+30); const inputId=`${type.toLowerCase().replace(" ","-")}-input-${id}`; if(editMode) return `<td><input type="date" id="${inputId}" value="${date}"></td>`; return `<td class="${status.class}">Last: ${formatDate(date)}<br>Due: ${formatDate(next)}<br>Days Left: ${diff}<br>${status.text}<br><button class="complete-btn" onclick="markComplete('${id}','${type}')">Complete</button></td>`; }
function getPriority(a){ return Math.min(getDiffDays(a.wash), getDiffDays(a.deep), getDiffDays(a.fumi)); }

// ── RENDER FUNCTIONS ──
function render(){ const table=document.getElementById("tableBody"); table.innerHTML=""; aircraftList.sort((a,b)=>getPriority(a)-getPriority(b)); let displayList=filterAircraftLive?aircraftList.filter(a=>a.name===filterAircraftLive):aircraftList; displayList.forEach(a=>{ const isEditing=editId===a.id; table.innerHTML+=`<tr><td>${a.name}</td>${createCell(a.wash,a.id,"Washing",isEditing)}${createCell(a.deep,a.id,"Deep Cleaning",isEditing)}${createCell(a.fumi,a.id,"Fumigation",isEditing)}<td>${isEditing?`<button class="save-btn" onclick="saveEdit('${a.id}')">Save</button><button class="cancel-btn" onclick="cancelEdit()">Cancel</button>`:`<button class="edit-btn" onclick="editRow('${a.id}')">Edit</button><button class="delete-btn" onclick="deleteRow('${a.id}')">Delete</button>`}</td></tr>`; }); populateFilterDropdown(); renderHistory(); }
function populateFilterDropdown(){ const select=document.getElementById("filterAircraftSelect"); const names=[...new Set(aircraftList.map(a=>a.name))]; select.querySelectorAll('option:not([value=""])').forEach(o=>o.remove()); names.forEach(name=>{ const opt=document.createElement("option"); opt.value=name; opt.textContent=name; if(name===filterAircraftLive) opt.selected=true; select.appendChild(opt); }); }
function renderHistory(){ const historyBody=document.getElementById("historyBody"); const aircraftButtonsDiv=document.getElementById("aircraftButtons"); const activityFilter=document.getElementById("activityFilterSelect").value; historyBody.innerHTML=""; aircraftButtonsDiv.innerHTML=""; const allBtn=document.createElement("span"); allBtn.textContent="All Aircraft"; allBtn.className="aircraft-filter"; allBtn.onclick=()=>{ filterAircraftHistory=null; renderHistory(); }; aircraftButtonsDiv.appendChild(allBtn); const aircraftNames=[...new Set(historyList.map(h=>h.aircraft))]; aircraftNames.forEach(name=>{ const btn=document.createElement("span"); btn.textContent=name; btn.className="aircraft-filter"; btn.onclick=()=>{ filterAircraftHistory=filterAircraftHistory===name?null:name; renderHistory(); }; aircraftButtonsDiv.appendChild(btn); }); let displayList=historyList; if(filterAircraftHistory) displayList=displayList.filter(h=>h.aircraft===filterAircraftHistory); if(activityFilter) displayList=displayList.filter(h=>h.type===activityFilter); displayList.slice().sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(item=>{ historyBody.innerHTML+=`<tr><td>${item.aircraft}</td><td>${item.type}</td><td>${formatDate(item.date)}</td><td><span style="cursor:pointer;color:red;font-weight:bold;" onclick="deleteHistory('${item.id}')">✖</span></td></tr>`; }); }

// ── FIRESTORE DATA ──
async function loadData(){ const aircraftSnap=await getDocs(collection(db,"aircraft")); aircraftList=aircraftSnap.docs.map(d=>({id:d.id,...d.data()})); onSnapshot(collection(db,"history"),snapshot=>{ historyList=snapshot.docs.map(d=>{ let dateVal=d.data().date; if(dateVal && dateVal.toDate) dateVal=dateVal.toDate().toISOString().split('T')[0]; return {id:d.id, aircraft:d.data().aircraft, type:d.data().type, date:dateVal}; }); renderHistory(); }); render(); }

// ── CRUD FUNCTIONS ──
async function saveAircraft(a){ if(a.id) await updateDoc(doc(db,"aircraft",a.id),{name:a.name,wash:a.wash,deep:a.deep,fumi:a.fumi}); else { const ref=await addDoc(collection(db,"aircraft"),{name:a.name,wash:a.wash,deep:a.deep,fumi:a.fumi}); a.id=ref.id; } }
async function addHistory(a){ await addDoc(collection(db,"history"),{aircraft:a.aircraft,type:a.type,date:a.date}); }
window.addAircraft=async function(){ const a={name:document.getElementById("aircraft").value,wash:document.getElementById("wash").value,deep:document.getElementById("deep").value,fumi:document.getElementById("fumi").value}; if(!a.name)return alert("Enter aircraft name"); await saveAircraft(a); await loadData(); }
window.markComplete=async function(id,type){ const today=new Date().toISOString().split('T')[0]; const a=aircraftList.find(x=>x.id===id); await addHistory({aircraft:a.name,type,date:today}); if(type==="Washing")a.wash=today; if(type==="Deep Cleaning")a.deep=today; if(type==="Fumigation")a.fumi=today; await saveAircraft(a); await loadData(); }
window.editRow=function(id){ editId=id; render(); }
window.cancelEdit=function(){ editId=null; render(); }
window.saveEdit=async function(id){ const a=aircraftList.find(x=>x.id===id); a.wash=document.getElementById(`washing-input-${id}`).value; a.deep=document.getElementById(`deep-cleaning-input-${id}`).value; a.fumi=document.getElementById(`fumigation-input-${id}`).value; editId=null; await saveAircraft(a); await loadData(); }
window.deleteRow=async function(id){ if(confirm("Are you sure?")){ await deleteDoc(doc(db,"aircraft",id)); await loadData(); } }
window.deleteHistory=async function(id){ if(confirm("Delete this history entry?")) await deleteDoc(doc(db,"history",id)); }
window.applyFilter=function(){ filterAircraftLive=document.getElementById("filterAircraftSelect").value; render(); }
window.toggleView=function(){ const live=document.getElementById("liveSection"); const history=document.getElementById("historySection"); const btn=document.getElementById("toggleViewBtn"); if(live.style.display==="none" || live.style.display===""){ live.style.display="block"; history.style.display="none"; btn.textContent="History Log"; } else{ live.style.display="none"; history.style.display="block"; btn.textContent="Live Tracker"; renderHistory(); } }

// ── PASSWORD MODAL LOGIC ──
const correctPassword="sadaf123";
const passwordModal=document.getElementById("passwordModal");
const passwordInput=document.getElementById("passwordInput");
const passwordBtn=document.getElementById("passwordBtn");

function unlockPage(){ 
  if(passwordInput.value===correctPassword){ passwordModal.style.display="none"; loadData(); }
  else alert("Wrong password!");
}
passwordBtn.addEventListener("click",unlockPage);
passwordInput.addEventListener("keypress",e=>{ if(e.key==="Enter") unlockPage(); });

// ── LIGHT/DARK TOGGLE ──
const modeToggle=document.getElementById("modeToggle");
const modeLabel=document.getElementById("modeLabel");
modeToggle.addEventListener("change",()=>{ 
  if(modeToggle.checked){ document.body.classList.add("light-mode"); localStorage.setItem("mode","light"); modeLabel.textContent="Light"; }
  else{ document.body.classList.remove("light-mode"); localStorage.setItem("mode","dark"); modeLabel.textContent="Dark"; }
});
// Apply saved mode
if(localStorage.getItem("mode")==="light"){ modeToggle.checked=true; document.body.classList.add("light-mode"); modeLabel.textContent="Light"; }

</script>
</body>
</html>
